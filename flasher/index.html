<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeepSeek Spend Monitor — Flasher</title>
  <script type="module" src="https://unpkg.com/esp-web-tools@10/dist/web/install-button.js?module"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>💰 DeepSeek Spend Monitor</h1>
    <p class="subtitle">USB flash tool for ESP32-C3 SuperMini</p>

    <esp-web-install-button
      id="install"
      manifest="manifest.json"
    ></esp-web-install-button>

    <div id="log"><div class="log-line dim">Waiting for you to click Install…</div></div>

    <p class="help">
      Plug in the ESP32-C3, click Install, and select the USB serial port.<br>
      Chrome / Edge on desktop work best. If flashing fails, hold <strong>BOOT</strong> → press <strong>RST</strong> → release <strong>BOOT</strong>.
    </p>
  </div>

  <script>
    (function() {
      var log = document.getElementById('log');
      var btn = document.getElementById('install');

      function line(text, cls) {
        var d = document.createElement('div');
        d.className = 'log-line ' + (cls || '');
        d.textContent = text;
        log.appendChild(d);
        log.scrollTop = log.scrollHeight;
      }

      // ── state-changed ──
      btn.addEventListener('state-changed', function(e) {
        // detail can be a number (0-4) or a string
        var states = ['Idle', 'Connecting…', 'Erasing…', 'Flashing…', 'Done ✅'];
        var s = e.detail;
        var label = (typeof s === 'number' && states[s]) ? states[s] : String(s);
        line(label, 'blue');
      });

      // ── erase-progress ──
      btn.addEventListener('erase-progress', function(e) {
        var pct = e.detail;
        // detail may be a number 0-1 or {percentage: number}
        if (pct && typeof pct === 'object' && pct.percentage !== undefined) {
          pct = pct.percentage;
        }
        pct = Math.round(pct * 100);
        line('Erasing… ' + pct + '%', 'blue');
      });

      // ── write-progress ──
      btn.addEventListener('write-progress', function(e) {
        var pct = e.detail;
        if (pct && typeof pct === 'object' && pct.percentage !== undefined) {
          pct = pct.percentage;
        }
        pct = Math.round(pct * 100);
        line('Flashing… ' + pct + '%', 'blue');
        if (pct >= 100) line('Flash complete! 🎉 Unplug and wait for the OLED AP.', 'green');
      });

      // ── error ──
      btn.addEventListener('error', function(e) {
        var msg = (e.detail && e.detail.message) || e.detail || 'unknown';
        line('ERROR: ' + msg, 'red');
      });

      // ── fallback click log ──
      btn.addEventListener('click', function() {
        line('Waiting for serial port…', 'dim');
      });
    })();
  </script>
</body>
</html>
