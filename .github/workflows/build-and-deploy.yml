name: Build Firmware & Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-${{ hashFiles('firmware/platformio.ini') }}

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: |
          cd firmware
          pio run -e esp32-c3-supermini

      - name: Install esptool
        run: pip install esptool

      - name: Merge & copy deploy files
        run: |
          BUILD=firmware/.pio/build/esp32-c3-supermini
          mkdir -p deploy

          # Merge bootloader + partitions + app into one flashable binary
          esptool.py --chip esp32c3 merge_bin \
            --flash_mode dio \
            --flash_size 4MB \
            -o deploy/firmware.bin \
            0x0 $BUILD/bootloader.bin \
            0x8000 $BUILD/partitions.bin \
            0x10000 $BUILD/firmware.bin

          cp flasher/index.html deploy/
          cp flasher/style.css deploy/
          cp flasher/manifest.json deploy/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

  deploy:
    needs: build-firmware
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
